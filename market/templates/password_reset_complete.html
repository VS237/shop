<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | MOM'SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    body {
        font-family: 'Inter', sans-serif;
        background-color: rgb(42, 41, 41);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .success-card {
        background-color: #ffffff;
        border-radius: 15px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .check-icon {
        width: 80px;
        height: 80px;
        background: rgba(255, 122, 0, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
    }
    .btn-login {
        background-color: #ff7a00;
        color: white;
        font-weight: bold;
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        text-decoration: none;
        transition: 0.3s;
        display: inline-block;
    }
    .btn-login:hover {
        background-color: #e66e00;
        transform: translateY(-2px);
        color: white;
    }
</style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="col-md-5">
        <div class="success-card">
            <div class="check-icon">
                <i class="fas fa-check" style="color: #ff7a00; font-size: 2.5rem;"></i>
            </div>
            <h2 class="fw-bold mb-3" style="color: #0c0c0c;">Password Updated</h2>
            <p class="text-muted mb-4">
                Your credentials have been successfully reset. You can now access your administrative dashboard.
            </p>
            <a href="/login/" class="btn-login text-uppercase">
                Go to Login
            </a>
        </div>
    </div>
</div>

</body>
</html>

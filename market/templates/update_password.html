<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MOM'SHOP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    
<style>

    body {
            font-family: 'Inter', sans-serif;
            background-color: rgb(42, 41, 41);
            color: var(--brand-black);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
    .form-control:focus {
        background-color: #f7f2f2 !important;
        color: rgb(7, 7, 7) !important;
        border: 1px solid #ff7a00 !important;
    }
    
    .btn:hover {
        background-color: #e66e00 !important;
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(255, 122, 0, 0.3);
    }
</style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 p-4" style="background-color: #ffffff; border-radius: 15px;">
            <div class="card-body">
                
                <div class="text-center mb-4">
                    <div class="d-inline-block p-3 rounded-circle mb-3" style="background-color: rgba(255, 122, 0, 0.1);">
                        <i class="fas fa-user-shield" style="color: #ff7a00; font-size: 2rem;"></i>
                    </div>
                    <h2 class="fw-bold" style="color: #0c0c0c;">New Credentials</h2>
                    <p style="color: #434141; font-size: 0.9rem;">
                        Secure your account by setting a new administrative password.
                    </p>
                </div>

                {% if msg %}
                    <div id="status-msg" class="alert border-0 text-center mb-4" style="background-color: rgba(255, 122, 0, 0.1); color: #ff7a00; font-size: 0.85rem;">
                        <i class="fas fa-exclamation-triangle me-2"></i> {{ msg }}
                    </div>
                {% endif %}

                <form method="POST" id="update-form">
    {% csrf_token %}
    
    <input type="hidden" name="access_token" id="access_token">
    <input type="hidden" name="refresh_token" id="refresh_token">

    <div class="mb-3">
        <label class="form-label small text-uppercase fw-bold" style="color: #ff7a00; letter-spacing: 1px;">New Password</label>
        <input type="password" name="new_password" id="new_password"
               class="form-control bg-white text-black border-2 py-2" 
               placeholder="••••••••" 
               style="border-radius: 8px; box-shadow: none;" required>
    </div>

    <div class="mb-4">
        <label class="form-label small text-uppercase fw-bold" style="color: #ff7a00; letter-spacing: 1px;">Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password"
               class="form-control bg-white text-black border-2 py-2" 
               placeholder="••••••••" 
               style="border-radius: 8px; box-shadow: none;" required>
    </div>

    <button type="submit" class="btn w-100 py-2 fw-bold text-uppercase" 
            style="background-color: #ff7a00; color: #000000; border-radius: 8px; transition: 0.3s;">
        Update Password
    </button>
</form>
            </div>
        </div>
    </div>
</div>

<script>
    function captureTokens() {
        // 1. Check both the hash (#) and the search (?) just in case
        const hash = window.location.hash.substring(1);
        const search = window.location.search.substring(1);
        const combined = hash + "&" + search;
        
        const params = new URLSearchParams(combined);
        const access = params.get('access_token');
        const refresh = params.get('refresh_token');

        if (access && refresh) {
            document.getElementById('access_token').value = access;
            document.getElementById('refresh_token').value = refresh;
            console.log("Tokens locked in.");
        } else {
            console.error("Tokens not found in URL");
        }
    }

    // Run on load
    window.onload = captureTokens;

    // Run again right before the form submits to be 100% sure
    document.getElementById('update-form').onsubmit = function() {
        captureTokens(); 
        const access = document.getElementById('access_token').value;
        if (!access) {
            alert("Critical Error: Tokens are still missing from the form.");
            return false; 
        }
        return true;
    };

    
</script>

</body>
</html>

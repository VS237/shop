<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MOM'SHOP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
    body {
            font-family: 'Inter', sans-serif;
            background-color: rgb(42, 41, 41);
            color: var(--brand-black);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
    }

    .btn:hover {
        background-color: #e66e00 !important;
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(255, 122, 0, 0.3);
    }
    
    .form-control:focus {
        background-color: #262626 !important;
        color: white !important;
        border: 1px solid #ff7a00 !important;
    }
</style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 p-4" style="background-color: white; border-radius: 15px;">
            <div class="card-body">
                <h2 class="fw-bold mb-2" style="color: black;">Update Password</h2>
                <p class="mb-4" style="color: #4e4e4e; font-size: 0.9rem;">
                    Ensure your account stays secure by choosing a strong, unique password.
                </p>

                {% if msg %}
                    <div class="alert border-0 text-center mb-4" style="background-color: rgba(255, 122, 0, 0.1); color: #ff7a00; font-size: 0.85rem;">
                        <i class="fas fa-shield-alt me-2"></i> {{ msg }}
                    </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label small text-uppercase fw-bold" style="color: #ff7a00; letter-spacing: 1px;">New Password</label>
                        <input type="password" name="new_password" 
                               class="form-control bg-white text-black border-2 py-2" 
                               placeholder="••••••••" 
                               style="border-radius: 8px; box-shadow: none;" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small text-uppercase fw-bold" style="color: #ff7a00; letter-spacing: 1px;">Confirm Password</label>
                        <input type="password" name="confirm_password" 
                               class="form-control bg-white text-black border-2 py-2" 
                               placeholder="••••••••" 
                               style="border-radius: 8px; box-shadow: none;" required>
                    </div>

                    <button type="submit" class="btn w-full py-2 fw-bold text-uppercase" 
                            style="background-color: black; color: white; border-radius: 8px; transition: 0.3s;">
                        Update Password
                    </button>
                </form>

                <div class="text-center mt-4 pt-2 border-top border-secondary">
                    <p style="color: #666; font-size: 0.75rem;">
                        <i class="fas fa-lock me-1"></i> 256-bit Encryption Active
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>



</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MOM'SHOP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
    /* Styling for the tech-focused input and button */
    body {
            font-family: 'Inter', sans-serif;
            background-color: rgb(42, 41, 41);
            color: var(--brand-black);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
    .form-control:focus {
        background-color: #262626 !important;
        color: white !important;
        border: 1px solid #ff7a00 !important;
    }
    
    .btn:hover {
        background-color: #e66e00 !important;
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(255, 122, 0, 0.3);
    }

    /* Animation for the alert message */
    .alert {
        animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 p-4" style="background-color: white; border-radius: 15px;">
            <div class="card-body">
                
                <div class="text-center mb-4">
                    <div class="d-inline-block p-3 rounded-circle mb-3" style="background-color: rgba(255, 122, 0, 0.1);">
                        <i class="fas fa-key" style="color: #ff7a00; font-size: 2rem;"></i>
                    </div>
                    <h2 class="fw-bold" style="color: black;">Forgot Password?</h2>
                    <p style="color: #535151; font-size: 0.9rem;">
                        No worries! Enter your email below and the <strong>MOM'SHOP</strong> system will send you a recovery link via Supabase.
                    </p>
                </div>

                {% if msg %}
                    <div class="alert border-0 text-center mb-4" style="background-color: rgba(255, 122, 0, 0.1); color: #ff7a00; font-size: 0.9rem;">
                        <i class="fas fa-paper-plane me-2"></i> {{ msg }}
                    </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label small text-uppercase fw-bold" style="color: #ff7a00; letter-spacing: 1px;">Registered Email</label>
                        <input type="email" name="email" 
                               class="form-control bg-white text-black border-2 py-2" 
                               placeholder="Enter your email address" 
                               style="border-radius: 8px; box-shadow: none;" required>
                    </div>

                    <button type="submit" class="btn w-100 py-2 fw-bold text-uppercase" 
                            style="background-color: black; color: white; border-radius: 8px; transition: 0.3s;">
                        Send Recovery Link
                    </button>
                </form>

                <div class="text-center mt-4">
                    <a href="{% url 'login' %}" class="text-decoration-none small" style="color: #b0b0b0;">
                        <i class="fas fa-arrow-left me-1"></i> Return to Sign In
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

</body>
</html>

{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 border rounded-lg shadow-sm">
    <h2 class="text-2xl font-bold mb-2">Reset Password</h2>
    <p class="text-gray-500 text-sm mb-6">We'll email you a magic link to reset your password.</p>
    {% if msg %}
        <div class="bg-blue-100 text-blue-700 p-3 rounded mb-4 text-sm">{{ msg }}</div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Email" class="w-full border p-2 rounded mb-4" required>
        <button type="submit" class="w-full bg-gray-800 text-white py-2 rounded">Send Magic Link</button>
    </form>
</div>
{% endblock %}
